<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Cursores CSS</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    <div class="container">
        <button class="pointer-btn">Clique Aqui (Pointer)</button>

    </div>
