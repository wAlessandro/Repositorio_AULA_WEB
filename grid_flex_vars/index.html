<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Flexbox + direction</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-direction: row; /* padrão: da esquerda pra direita */
      direction: rtl;      /* inverte a direção do fluxo lógico */
      gap: 10px;
      background: #f5f5f5;
      padding: 20px;
      border: 2px dashed #ccc;
    }

    .item {
      padding: 20px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <h2>Exemplo com <code>direction: rtl</code></h2>

  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>

</body>
</html>
